<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Zenqor Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-nav logo-text" style="display: flex; align-items: center;">
                <img src="logo.png" alt="Logo" style="width: 32px; height: 32px; margin-right: 10px; border-radius: 50%;">
                <span><span class="text-primary">Zenqor</span> Technologies</span>
            </a>
            <nav class="nav-links">
                <a href="return-policy.html" data-i18n="nav_return"></a>
                <a href="index.html" data-i18n="nav_home"></a>
                <a href="about.html" data-i18n="nav_about"></a>
                <a href="services.html" data-i18n="nav_services"></a>
                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="portfolio-menu"><span data-i18n="nav_portfolio"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i></a>
                    <div class="dropdown-menu" id="portfolio-menu">
                        <a href="portfolio-gaming.html" data-i18n="nav_port_gaming"></a>
                        <a href="portfolio-web.html" data-i18n="nav_port_web"></a>
                    </div>
                </div>
                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="careers-menu"><span data-i18n="nav_careers"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i></a>
                    <div class="dropdown-menu" id="careers-menu">
                        <a href="careers.html" data-i18n="nav_careers_join"></a>
                    </div>
                </div>
                <a href="contact.html" style="color: var(--primary-blue);" data-i18n="nav_contact"></a>
                <button id="lang-toggle" class="lang-btn"></button>
                <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>
            </nav>
            <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <section id="contact" class="contact section-padding bg-alt" style="padding-top: 140px;">
        <div class="container">
            <div class="section-header reveal">
                <h1 data-i18n="nav_contact" style="font-size: 3rem; margin-bottom: 15px;"></h1>
                <h2 data-i18n="con_title" style="font-size: 1.8rem; margin-bottom: 10px;"></h2>
                <p data-i18n="con_sub"></p>
            </div>
            
            <div class="contact-grid">
                <div class="contact-info card-style reveal">
                    <h3 data-i18n="hq_title"></h3>
                    <div class="info-row">
                        <i class="fas fa-map-marker-alt text-accent"></i>
                        <p data-i18n="hq_addr"></p>
                    </div>
                    <div class="info-row">
                        <i class="fas fa-envelope text-accent"></i>
                        <div>
                            <p>info@zenqor.com.my</p>
                        </div>
                    </div>
                </div>
                <form class="contact-form card-style reveal" id="mainContactForm">
                    <div class="input-group">
                        <input type="text" id="form_name" data-i18n-placeholder="ph_name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="form_email" data-i18n-placeholder="ph_email" required>
                    </div>
                    <div class="input-group">
                        <textarea rows="4" id="form_msg" data-i18n-placeholder="ph_msg" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" data-i18n="btn_submit"></button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content" style="margin-bottom: 0;">
            <div class="footer-brand" style="margin-bottom: 25px;">
                <a href="index.html" class="logo-footer logo-text" style="display: flex; align-items: center; justify-content: center;">
                    <img src="logo.png" alt="Logo" style="width: 32px; height: 32px; margin-right: 10px; border-radius: 50%;">
                    <span><span class="text-primary">Zenqor</span> Technologies</span>
                </a>
                <div style="margin-top: 12px; font-size: 0.9rem; color: var(--text-secondary);">
                    <p style="margin-bottom: 4px;"><strong>Zenqor Technologies</strong></p>
                    <p>No. Pendaftaran: 202603157897 (JM1045730-D)</p>
                </div>
            </div>
        </div>
        <div class="footer-bottom" style="padding-top: 20px;"><p data-i18n="footer_copy"></p></div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
