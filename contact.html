<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Zenqor Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-nav logo-text">
                <span class="text-primary">Zenqor</span> Technologies
            </a>
            <nav class="nav-links">
                <a href="return-policy.html" data-i18n="nav_return"></a>
                <a href="index.html" data-i18n="nav_home"></a>
                <a href="about.html" data-i18n="nav_about"></a>
                <a href="services.html" data-i18n="nav_services"></a>
                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="portfolio-menu"><span data-i18n="nav_portfolio"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i></a>
                    <div class="dropdown-menu" id="portfolio-menu"><a href="portfolio-gaming.html" data-i18n="nav_port_gaming"></a><a href="portfolio-web.html" data-i18n="nav_port_web"></a></div>
                </div>
                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="careers-menu"><span data-i18n="nav_careers"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i></a>
                    <div class="dropdown-menu" id="careers-menu"><a href="careers.html" data-i18n="nav_careers_join"></a></div>
                </div>
                <a href="contact.html" style="color: var(--primary-blue);" data-i18n="nav_contact"></a>
                <button id="lang-toggle" class="lang-btn"></button>
                <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>
            </nav>
            <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <section class="hero section-padding" style="min-height: 40vh; padding-top: 150px; padding-bottom: 20px;">
        <div class="container hero-content reveal">
            <h1 data-i18n="nav_contact"></h1>
        </div>
    </section>

    <section id="contact" class="contact section-padding bg-alt">
        <div class="container">
            <div class="section-header reveal">
                <h2 data-i18n="con_title"></h2>
                <p data-i18n="con_sub"></p>
            </div>
            <div class="contact-grid">
                <div class="contact-info card-style reveal">
                    <h3 data-i18n="hq_title"></h3>
                    <div class="info-row">
                        <i class="fas fa-map-marker-alt text-accent"></i>
                        <p data-i18n="hq_addr"></p>
                    </div>
                    <div class="info-row">
                        <i class="fas fa-envelope text-accent"></i>
                        <p>info@zenqor.com.my</p>
                        <p>zenqor.dev@gmail.com</p>
                    </div>
                    <div class="info-row">
                        <i class="fas fa-phone-alt text-accent"></i>
                        <p>+60 11 6501 2569</p>
                    </div>
                </div>
                <form class="contact-form card-style reveal" id="mainContactForm">
                    <div class="input-group">
                        <input type="text" id="form_name" data-i18n-placeholder="ph_name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="form_email" data-i18n-placeholder="ph_email" required>
                    </div>
                    <div class="input-group">
                        <select required id="form_select">
                            <option value="" disabled selected data-i18n="opt_def"></option>
                            <option data-i18n="opt_1"></option>
                            <option data-i18n="opt_2"></option>
                            <option data-i18n="opt_3"></option>
                            <option data-i18n="opt_4"></option>
                        </select>
                    </div>
                    <div class="input-group">
                        <textarea rows="4" id="form_msg" data-i18n-placeholder="ph_msg" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" data-i18n="btn_submit"></button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <div class="footer-brand">
                <a href="index.html" class="logo-footer logo-text">
                    <span class="text-primary">Zenqor</span> Technologies
                </a>
                <!-- SSM Compliance Info -->
                    <div style="margin-top: 10px; font-size: 0.85rem; color: var(--text-secondary);">
                        <p><strong>Zenqor Technologies</strong></p>
                        <p>No. Pendaftaran: 202603157897 (JM1045730-D)</p>
                    </div>
                <p data-i18n="footer_sub"></p>
            </div>
            <div class="footer-links">
                <a href="services.html" data-i18n="nav_services"></a>
                <a href="careers.html" data-i18n="nav_careers"></a>
                <a href="contact.html" data-i18n="nav_contact"></a>
            </div>
            <div class="footer-social">
                <a href="#"><i class="fab fa-linkedin"></i></a><a href="#"><i class="fab fa-github"></i></a><a href="#"><i class="fab fa-discord"></i></a>
            </div>
        </div>
        <div class="footer-bottom"><p data-i18n="footer_copy"></p></div>
    </footer>

    <script type="module">
        import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@2/dist/index.js';
        injectSpeedInsights();
    </script>
    <script src="script.js"></script>
</body>
</html>
