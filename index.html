<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenqor Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-nav">
                <img src="zenq-logo.png" alt="Zenqor Logo" class="logo-img-nav">
            </a>
            <nav class="nav-links">
                <a href="index.html" data-i18n="nav_home"></a>
                <a href="about.html" data-i18n="nav_about"></a>
                <a href="services.html" data-i18n="nav_services"></a>
                
                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="portfolio-menu">
                        <span data-i18n="nav_portfolio"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i>
                    </a>
                    <div class="dropdown-menu" id="portfolio-menu">
                        <a href="portfolio-gaming.html" data-i18n="nav_port_gaming"></a>
                        <a href="portfolio-web.html" data-i18n="nav_port_web"></a>
                    </div>
                </div>

                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="careers-menu">
                        <span data-i18n="nav_careers"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i>
                    </a>
                    <div class="dropdown-menu" id="careers-menu">
                        <a href="careers.html" data-i18n="nav_careers_join"></a>
                    </div>
                </div>

                <a href="contact.html" data-i18n="nav_contact"></a>
                <button id="lang-toggle" class="lang-btn"></button>
                <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>
            </nav>
            <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <section id="home" class="hero section-padding">
        <div class="container hero-content reveal">
            <div class="badge" data-i18n="hero_badge"></div>
            <h1 data-i18n="hero_title"></h1>
            <p class="hero-sub" data-i18n="hero_sub"></p>
            <div class="hero-actions">
                <a href="portfolio-web.html" class="btn btn-primary" data-i18n="btn_portfolio"></a>
                <a href="contact.html" class="btn btn-outline" data-i18n="btn_contact"></a>
            </div>
            
            <div class="stats-grid card-style mt-5 reveal">
                <div class="stat-card">
                    <h3 class="text-primary">150+</h3>
                    <p data-i18n="stat_1"></p>
                </div>
                <div class="stat-card">
                    <h3 class="text-primary">99.9%</h3>
                    <p data-i18n="stat_2"></p>
                </div>
                <div class="stat-card">
                    <h3 class="text-primary">2M+</h3>
                    <p data-i18n="stat_3"></p>
                </div>
                <div class="stat-card">
                    <h3 class="text-primary" data-i18n="stat_gov"></h3>
                    <p data-i18n="stat_4"></p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <div class="footer-brand">
                <a href="index.html" class="logo-footer">
                    <img src="zenq-logo.png" alt="Zenqor Logo" class="logo-img-footer">
                </a>
                <p data-i18n="footer_sub"></p>
            </div>
            <div class="footer-links">
                <a href="services.html" data-i18n="nav_services"></a>
                <a href="careers.html" data-i18n="nav_careers"></a>
                <a href="contact.html" data-i18n="nav_contact"></a>
            </div>
            <div class="footer-social">
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-discord"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p data-i18n="footer_copy"></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
