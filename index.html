<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenqor.Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="#home" class="logo-nav">
                <img src="official_logo_ZT.png" alt="Zenqor Logo" class="logo-img-nav">
            </a>
            <nav class="nav-links">
                <a href="#home" data-i18n="nav_home"></a>
                <a href="#about" data-i18n="nav_about"></a>
                <a href="#services" data-i18n="nav_services"></a>
                
                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="portfolio-menu">
                        <span data-i18n="nav_portfolio"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i>
                    </a>
                    <div class="dropdown-menu" id="portfolio-menu">
                        <a href="portfolio-gaming.html" data-i18n="nav_port_gaming"></a>
                        <a href="portfolio-web.html" data-i18n="nav_port_web"></a>
                    </div>
                </div>

                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="careers-menu">
                        <span data-i18n="nav_careers"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i>
                    </a>
                    <div class="dropdown-menu" id="careers-menu">
                        <a href="careers.html" data-i18n="nav_careers_join"></a>
                    </div>
                </div>

                <a href="#contact" data-i18n="nav_contact"></a>
                <button id="lang-toggle" class="lang-btn"></button>
                <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>
            </nav>
            <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <section id="home" class="hero section-padding">
        <div class="container hero-content reveal">
            <div class="badge" data-i18n="hero_badge"></div>
            <h1 data-i18n="hero_title"></h1>
            <p class="hero-sub" data-i18n="hero_sub"></p>
            <div class="hero-actions">
                <a href="portfolio-web.html" class="btn btn-primary" data-i18n="btn_portfolio"></a>
                <a href="#contact" class="btn btn-outline" data-i18n="btn_contact"></a>
            </div>
            
            <div class="stats-grid card-style mt-5 reveal">
                <div class="stat-card">
                    <h3 class="text-primary">150+</h3>
                    <p data-i18n="stat_1"></p>
                </div>
                <div class="stat-card">
                    <h3 class="text-primary">99.9%</h3>
                    <p data-i18n="stat_2"></p>
                </div>
                <div class="stat-card">
                    <h3 class="text-primary">2M+</h3>
                    <p data-i18n="stat_3"></p>
                </div>
                <div class="stat-card">
                    <h3 class="text-primary" data-i18n="stat_gov"></h3>
                    <p data-i18n="stat_4"></p>
                </div>
            </div>
        </div>
    </section>

    <section id="about" class="about section-padding bg-alt">
        <div class="container">
            <div class="section-header reveal">
                <h2 data-i18n="about_title"></h2>
                <p data-i18n="about_sub"></p>
            </div>
            <div class="tech-stack-container reveal">
                <div class="tech-category card-style hover-up">
                    <i class="fas fa-layer-group text-accent icon-lg"></i>
                    <h3 data-i18n="tech_1"></h3>
                    <ul>
                        <li>HTML5 & CSS3</li>
                        <li>JavaScript (ES6+)</li>
                        <li>React</li>
                    </ul>
                </div>
                <div class="tech-category card-style hover-up">
                    <i class="fas fa-server text-accent icon-lg"></i>
                    <h3 data-i18n="tech_2"></h3>
                    <ul>
                        <li>Node.js</li>
                        <li>Python</li>
                        <li>PHP</li>
                    </ul>
                </div>
                <div class="tech-category card-style hover-up">
                    <i class="fas fa-database text-accent icon-lg"></i>
                    <h3 data-i18n="tech_3"></h3>
                    <ul>
                        <li>PostgreSQL</li>
                        <li>MySQL</li>
                        <li>MariaDB</li>
                    </ul>
                </div>
                <div class="tech-category card-style hover-up">
                    <i class="fas fa-cloud text-accent icon-lg"></i>
                    <h3 data-i18n="tech_4"></h3>
                    <ul>
                        <li>AWS</li>
                        <li>Google Cloud</li>
                        <li>Microsoft Azure</li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <section id="services" class="services section-padding">
        <div class="container">
            <div class="section-header reveal">
                <h2 data-i18n="srv_main_title"></h2>
                <p data-i18n="srv_main_sub"></p>
            </div>
            <div class="services-grid">
                <div class="service-card card-style reveal hover-up">
                    <i class="fas fa-gamepad text-primary icon-lg"></i>
                    <h3 data-i18n="srv_1_t"></h3>
                    <p data-i18n="srv_1_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.1s;">
                    <i class="fas fa-mobile-alt text-primary icon-lg"></i>
                    <h3 data-i18n="srv_2_t"></h3>
                    <p data-i18n="srv_2_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.2s;">
                    <i class="fas fa-globe text-primary icon-lg"></i>
                    <h3 data-i18n="srv_3_t"></h3>
                    <p data-i18n="srv_3_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.3s;">
                    <i class="fas fa-code text-primary icon-lg"></i>
                    <h3 data-i18n="srv_4_t"></h3>
                    <p data-i18n="srv_4_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.4s;">
                    <i class="fas fa-pen-nib text-primary icon-lg"></i>
                    <h3 data-i18n="srv_5_t"></h3>
                    <p data-i18n="srv_5_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.5s;">
                    <i class="fas fa-brain text-primary icon-lg"></i>
                    <h3 data-i18n="srv_6_t"></h3>
                    <p data-i18n="srv_6_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.6s;">
                    <i class="fas fa-network-wired text-primary icon-lg"></i>
                    <h3 data-i18n="srv_7_t"></h3>
                    <p data-i18n="srv_7_d"></p>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="contact section-padding bg-alt">
        <div class="container">
            <div class="section-header reveal">
                <h2 data-i18n="con_title"></h2>
                <p data-i18n="con_sub"></p>
            </div>
            <div class="contact-grid">
                <div class="contact-info card-style reveal">
                    <h3 data-i18n="hq_title"></h3>
                    <div class="info-row">
                        <i class="fas fa-map-marker-alt text-accent"></i>
                        <p data-i18n="hq_addr"></p>
                    </div>
                    <div class="info-row">
                        <i class="fas fa-envelope text-accent"></i>
                        <p>info@zenqor.com.my</p>
                        <p>zenqor.dev@gmail.com</p>
                    </div>
                    <div class="info-row">
                        <i class="fas fa-phone-alt text-accent"></i>
                        <p>+60 11 6501 2569</p>
                    </div>
                </div>
                <form class="contact-form card-style reveal" id="mainContactForm">
                    <div class="input-group">
                        <input type="text" id="form_name" data-i18n-placeholder="ph_name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="form_email" data-i18n-placeholder="ph_email" required>
                    </div>
                    <div class="input-group">
                        <select required id="form_select">
                            <option value="" disabled selected data-i18n="opt_def"></option>
                            <option data-i18n="opt_1"></option>
                            <option data-i18n="opt_2"></option>
                            <option data-i18n="opt_3"></option>
                            <option data-i18n="opt_4"></option>
                        </select>
                    </div>
                    <div class="input-group">
                        <textarea rows="4" id="form_msg" data-i18n-placeholder="ph_msg" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" data-i18n="btn_submit"></button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <div class="footer-brand">
                <a href="#home" class="logo-footer">
                    <img src="official_logo_ZT.png" alt="Zenqor Logo" class="logo-img-footer">
                </a>
                <p data-i18n="footer_sub"></p>
            </div>
            <div class="footer-links">
                <a href="#services" data-i18n="nav_services"></a>
                <a href="careers.html" data-i18n="nav_careers"></a>
                <a href="#contact" data-i18n="nav_contact"></a>
            </div>
            <div class="footer-social">
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-discord"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p data-i18n="footer_copy"></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
