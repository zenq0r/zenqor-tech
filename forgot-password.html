<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Zenqor Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 80vh; padding-top: 140px; padding-bottom: 60px; }
        .login-card { width: 100%; max-width: 420px; padding: 40px; background-color: var(--bg-card, #151A23); border-radius: 12px; box-shadow: var(--card-shadow, 0 10px 30px rgba(0,0,0,0.3)); border: 1px solid var(--border-color, #2A3241); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header img { width: 60px; margin-bottom: 15px; }
        .login-header h2 { font-size: 1.8rem; color: var(--text-main, #fff); margin-bottom: 5px; }
        .login-header p { color: var(--text-secondary, #94A3B8); font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-main, #E2E8F0); font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px 15px; background-color: var(--bg-main, #0F131A); border: 1px solid var(--border-color, #2A3241); color: #fff; border-radius: 6px; font-family: 'Inter', sans-serif; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--primary-blue, #3B82F6); }
        .register-link { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-secondary, #94A3B8); }
        .register-link a { color: var(--primary-blue, #3B82F6); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body class="bg-alt">
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-nav logo-text">
                <img src="logo.png" alt="Zenqor Logo" class="nav-logo-img">
                <span class="text-primary">Zenqor</span> Technologies
            </a>
            <nav class="nav-links">
                <a href="index.html" data-i18n="nav_home">Home</a>
                <a href="login.html" class="btn btn-primary" style="padding: 8px 20px; font-size: 0.9rem; border-radius: 6px; text-decoration: none;">Login</a>
            </nav>
        </div>
    </header>

    <section class="login-wrapper container">
        <div class="login-card reveal">
            <div class="login-header">
                <a href="index.html"><img src="logo.png" alt="Zenqor Logo"></a>
                <h2>Reset Password</h2>
                <p>Enter your email to receive a reset link.</p>
            </div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                
                <div id="formMessage" class="form-message"></div>

                <button type="submit" class="btn btn-primary w-100" style="padding: 12px; font-size: 1rem; border: none; cursor: pointer;">Send Reset Link</button>
            </form>

            <div class="register-link">
                Remembered your password? <a href="login.html">Sign in</a>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJyjvlm8jG-mT_1mDYsyF562L6XuskFxU",
            authDomain: "zenqor-web.firebaseapp.com",
            projectId: "zenqor-web",
            storageBucket: "zenqor-web.firebasestorage.app",
            messagingSenderId: "785478368719",
            appId: "1:785478368719:web:ef6fa34ed5d949ac2566ba"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const resetForm = document.getElementById('resetForm');
        const formMessage = document.getElementById('formMessage');

        if(resetForm) {
            resetForm.addEventListener('submit', function(e) {
                e.preventDefault(); 
                const email = document.getElementById('email').value;
                const btn = this.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                
                formMessage.textContent = "";
                formMessage.className = "form-message";
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                btn.disabled = true;

                sendPasswordResetEmail(auth, email)
                    .then(() => {
                        formMessage.textContent = "Pautan telah dihantar ke e-mel anda.";
                        formMessage.classList.add("msg-success");
                        setTimeout(() => { window.location.href = "login.html"; }, 2000);
                    })
                    .catch((error) => {
                        formMessage.textContent = "Ralat: Pastikan e-mel betul atau telah didaftarkan.";
                        formMessage.classList.add("msg-error");
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    });
            });
        }
    </script>
</body>
</html>
