<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zenqor Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 80vh; padding-top: 140px; padding-bottom: 60px; }
        .login-card { width: 100%; max-width: 420px; padding: 40px; background-color: var(--surface-color, rgba(15, 23, 42, 0.65)); border-radius: 12px; box-shadow: var(--card-shadow); border: 1px solid var(--border-color); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header img { width: 60px; margin-bottom: 15px; }
        .login-header h2 { font-size: 1.8rem; color: var(--text-primary); margin-bottom: 5px; }
        .login-header p { color: var(--text-secondary); font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-primary); font-size: 0.9rem; font-weight: 500;}
        .form-group input { width: 100%; padding: 12px 15px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; font-family: 'Inter', sans-serif; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        .toggle-password { position: absolute; right: 15px; top: 38px; color: var(--text-secondary); cursor: pointer; }
        .login-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 0.85rem; }
        .remember-me { display: flex; align-items: center; gap: 8px; color: var(--text-primary); cursor: pointer; }
        .forgot-pass { color: var(--primary-blue); text-decoration: none; transition: color 0.2s; }
        .forgot-pass:hover { color: var(--primary-hover); }
        .register-link { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-secondary); }
        .register-link a { color: var(--primary-blue); text-decoration: none; font-weight: 600; }
        .form-message { text-align: center; margin-bottom: 15px; font-size: 0.9rem; font-weight: 500; min-height: 20px; padding: 10px; border-radius: 6px; display: none; }
        .form-message.show { display: block; }
        .msg-success { color: #10B981; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); }
        .msg-error { color: #EF4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="bg-alt">
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-nav logo-text">
                <img src="logo.png" alt="Zenqor Logo" class="nav-logo-img">
                <span class="text-primary">Zenqor</span> Technologies
            </a>
            <nav class="nav-links">
                <a href="index.html" data-i18n="nav_home">Home</a>
                <a href="services.html" data-i18n="nav_services">Services</a>
                <a href="about.html" data-i18n="nav_about">About</a>
                <a href="contact.html" data-i18n="nav_contact">Contact</a>
                <div style="display: flex; align-items: center; gap: 15px; margin-left: 15px;">
                    <a href="login.html" class="btn btn-primary" style="padding: 8px 20px; font-size: 0.9rem; border-radius: 6px; text-decoration: none;">Login</a>
                </div>
            </nav>
            <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <section class="login-wrapper container">
        <div class="login-card reveal active">
            <div class="login-header">
                <a href="index.html"><img src="logo.png" alt="Zenqor Logo"></a>
                <h2>Welcome Back</h2>
                <p>Please enter your details to sign in.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="zenqortech@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
                <div class="login-options">
                    <label class="remember-me"><input type="checkbox" id="remember"> Remember me</label>
                    <a href="forgot-password.html" class="forgot-pass">Forgot Password?</a>
                </div>
                
                <div id="formMessage" class="form-message"></div>
                
                <button type="submit" class="btn btn-primary w-100" style="padding: 12px; font-size: 1rem; border: none; cursor: pointer;">Sign In</button>
            </form>

            <div class="register-link">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content" style="margin-bottom: 0; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 15px;">
            <div class="footer-bottom" style="padding-top: 20px; border-top: 1px solid var(--border-color); text-align: center; width: 100%;">
                <p>© 2026 Zenqor Technologies (Malaysia). All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            if(togglePassword) {
                togglePassword.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                });
            }
        });
    </script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJyjvlm8jG-mT_1mDYsyF562L6XuskFxU",
            authDomain: "zenqor-web.firebaseapp.com",
            projectId: "zenqor-web",
            storageBucket: "zenqor-web.firebasestorage.app",
            messagingSenderId: "785478368719",
            appId: "1:785478368719:web:ef6fa34ed5d949ac2566ba"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        const ADMIN_EMAIL = "zenqortech@gmail.com";

        const loginForm = document.getElementById('loginForm');
        const formMessage = document.getElementById('formMessage');

        if(loginForm) {
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault(); 
                
                // PENGESAHAN KETAT: Buang ruang kosong & tukar ke huruf kecil
                const email = document.getElementById('email').value.trim().toLowerCase();
                const password = document.getElementById('password').value;
                const btn = this.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                
                formMessage.className = "form-message";
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
                btn.disabled = true;

                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const loggedInEmail = userCredential.user.email.toLowerCase();

                    formMessage.textContent = "Log masuk berjaya! Memuatkan...";
                    formMessage.classList.add("msg-success", "show");
                    
                    setTimeout(() => { 
                        // Jika Admin, pergi ke dashboard. Jika user biasa, pergi ke laman utama.
                        if(loggedInEmail === ADMIN_EMAIL) {
                            window.location.replace("admin-dashboard.html"); 
                        } else {
                            window.location.replace("index.html"); 
                        }
                    }, 1000);

                } catch (error) {
                    console.error("Auth Error Code:", error.code);
                    let errorMsg = "Ralat log masuk.";
                    
                    // Ralat Spesifik Firebase
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found') {
                        errorMsg = "Akaun tiada atau e-mel/kata laluan salah.";
                    } else if (error.code === 'auth/wrong-password') {
                        errorMsg = "Kata laluan yang dimasukkan adalah salah.";
                    } else if (error.code === 'auth/too-many-requests') {
                        errorMsg = "Akaun disekat sementara. Cuba lagi sebentar lagi.";
                    } else {
                        errorMsg = "Sistem Ralat: " + error.message;
                    }

                    formMessage.textContent = errorMsg;
                    formMessage.classList.add("msg-error", "show");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
