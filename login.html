<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>Secure Login | Zenqor Technologies</title>
    <meta name="description" content="Sign in to your Zenqor Technologies account to access enterprise digital services, server management, and premium resources.">
    <link rel="canonical" href="https://zenqor-tech.kauaku.store/login.html">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Secure Login | Zenqor Technologies">
    <meta property="og:description" content="Access your Zenqor dashboard and premium digital resources.">
    <meta property="og:url" content="https://zenqor-tech.kauaku.store/login.html">

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 80vh; padding-top: 140px; padding-bottom: 60px; }
        .login-card { width: 100%; max-width: 420px; padding: 40px; background-color: var(--bg-card, #151A23); border-radius: 12px; box-shadow: var(--card-shadow, 0 10px 30px rgba(0,0,0,0.3)); border: 1px solid var(--border-color, #2A3241); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header img { width: 60px; margin-bottom: 15px; }
        .login-header h2 { font-size: 1.8rem; color: var(--text-main, #fff); margin-bottom: 5px; }
        .login-header p { color: var(--text-secondary, #94A3B8); font-size: 0.9rem; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-main, #E2E8F0); font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px 15px; background-color: var(--bg-main, #0F131A); border: 1px solid var(--border-color, #2A3241); color: #fff; border-radius: 6px; font-family: 'Inter', sans-serif; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--primary-blue, #3B82F6); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .toggle-password { position: absolute; right: 15px; top: 38px; color: var(--text-secondary, #94A3B8); cursor: pointer; padding: 5px; }
        .login-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 0.85rem; }
        .remember-me { display: flex; align-items: center; gap: 8px; color: var(--text-main, #E2E8F0); cursor: pointer; }
        .forgot-pass { color: var(--primary-blue, #3B82F6); text-decoration: none; transition: color 0.2s; }
        .forgot-pass:hover { color: #60A5FA; }
        .register-link { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-secondary, #94A3B8); }
        .register-link a { color: var(--primary-blue, #3B82F6); text-decoration: none; font-weight: 600; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body class="bg-alt">
    <header class="navbar" role="banner">
        <div class="container nav-container">
            <a href="index.html" class="logo-nav logo-text" aria-label="Zenqor Technologies Home">
                <img src="logo.png" alt="Zenqor Logo" class="nav-logo-img" width="35" height="35">
                <span class="text-primary">Zenqor</span> Technologies
            </a>
            <nav class="nav-links" aria-label="Main Navigation">
                <a href="index.html" data-i18n="nav_home">Home</a>
                <a href="services.html" data-i18n="nav_services">Services</a>
                <a href="about.html" data-i18n="nav_about">About</a>
                <a href="contact.html" data-i18n="nav_contact">Contact</a>
                <div style="display: flex; align-items: center; gap: 15px; margin-left: 15px;">
                    <a href="login.html" class="btn btn-primary" style="padding: 8px 20px; font-size: 0.9rem; border-radius: 6px; text-decoration: none;" aria-label="Login">Login</a>
                </div>
            </nav>
            <button class="mobile-menu-btn" aria-label="Open Mobile Menu" aria-expanded="false"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <main id="main-content">
        <section class="login-wrapper container">
            <div class="login-card reveal">
                <div class="login-header">
                    <a href="index.html" aria-label="Back to Home"><img src="logo.png" alt="Zenqor Logo" width="60" height="60"></a>
                    <h2>Welcome Back</h2>
                    <p>Please enter your details to sign in.</p>
                </div>

                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="name@example.com" required aria-required="true" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required aria-required="true" autocomplete="current-password">
                        <i class="fas fa-eye toggle-password" id="togglePassword" role="button" aria-label="Toggle password visibility" tabindex="0"></i>
                    </div>
                    <div class="login-options">
                        <label class="remember-me"><input type="checkbox" id="remember"> Remember me</label>
                        <a href="forgot-password.html" class="forgot-pass">Forgot Password?</a>
                    </div>
                    
                    <div id="formMessage" class="form-message" aria-live="polite" role="alert"></div>
                    
                    <button type="submit" class="btn btn-primary w-100" style="padding: 12px; font-size: 1rem; border: none; cursor: pointer;">Sign In</button>
                </form>

                <div class="register-link">
                    Don't have an account? <a href="register.html">Sign up</a>
                </div>
            </div>
        </section>
    </main>

    <footer role="contentinfo">
        <div class="container footer-content" style="margin-bottom: 0; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 15px;">
            <div class="footer-bottom" style="padding-top: 20px; border-top: 1px solid var(--border-color); text-align: center; width: 100%;">
                <p data-i18n="footer_copy">© 2026 Zenqor Technologies (Malaysia). All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            if(togglePassword) {
                const toggleAction = function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                };
                togglePassword.addEventListener('click', toggleAction);
                togglePassword.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleAction.call(this); }
                });
            }
        });
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJyjvlm8jG-mT_1mDYsyF562L6XuskFxU",
            authDomain: "zenqor-web.firebaseapp.com",
            projectId: "zenqor-web",
            storageBucket: "zenqor-web.firebasestorage.app",
            messagingSenderId: "785478368719",
            appId: "1:785478368719:web:ef6fa34ed5d949ac2566ba"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const formMessage = document.getElementById('formMessage');

        if(loginForm) {
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault(); 
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const btn = this.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                
                if (!email || !password) {
                    formMessage.textContent = "Please fill in all fields.";
                    formMessage.className = "form-message msg-error";
                    return;
                }

                formMessage.textContent = "";
                formMessage.className = "form-message";
                btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
                btn.disabled = true;

                signInWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        formMessage.textContent = "Secure login successful. Redirecting...";
                        formMessage.classList.add("msg-success");
                        
                        setTimeout(() => { 
                            if(userCredential.user.email === "zenqortech@gmail.com") {
                                window.location.replace("admin-dashboard.html"); 
                            } else {
                                window.location.replace("index.html"); 
                            }
                        }, 1500);
                    })
                    .catch((error) => {
                        console.error("Auth Error:", error.code);
                        // Enterprise Standard: Generic error message to prevent account enumeration
                        formMessage.textContent = "Invalid email or password. Please try again.";
                        formMessage.classList.add("msg-error");
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    });
            });
        }
    </script>
</body>
</html>
