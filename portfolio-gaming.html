<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Portfolio | Zenqor Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-nav logo-text">
                <img src="logo.png" alt="Zenqor Logo" class="nav-logo-img">
                <span class="text-primary">Zenqor</span> Technologies
            </a>
            <nav class="nav-links">
                <a href="return-policy.html" data-i18n="nav_return"></a>
                <a href="index.html" data-i18n="nav_home"></a>
                <a href="about.html" data-i18n="nav_about"></a>
                <a href="services.html" data-i18n="nav_services"></a>
                
                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="portfolio-menu" style="color: var(--primary-blue);">
                        <span data-i18n="nav_portfolio"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i>
                    </a>
                    <div class="dropdown-menu" id="portfolio-menu">
                        <a href="portfolio-gaming.html" style="color: var(--primary-blue);" data-i18n="nav_port_gaming"></a>
                        <a href="portfolio-web.html" data-i18n="nav_port_web"></a>
                    </div>
                </div>

                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="careers-menu">
                        <span data-i18n="nav_careers"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i>
                    </a>
                    <div class="dropdown-menu" id="careers-menu">
                        <a href="careers.html" data-i18n="nav_careers_join"></a>
                    </div>
                </div>

                <a href="contact.html" data-i18n="nav_contact"></a>
                <button id="lang-toggle" class="lang-btn"></button>
                <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>
            </nav>
            <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <section class="hero-inner reveal">
        <div class="container hero-content reveal">
            <div class="badge" data-i18n="nav_port_gaming"></div>
            <h1 data-i18n="pg_hero_title"></h1>
            <p class="hero-sub" data-i18n="pg_hero_sub"></p>
        </div>
    </section>

    <section class="portfolio section-padding">
        <div class="container">
            <div class="portfolio-grid">
                <div class="portfolio-item card-style reveal hover-up">
                    <div class="port-img" style="background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');"></div>
                    <div class="port-content">
                        <span class="tag">Unreal Engine 5</span>
                        <h3 data-i18n="pg_1_t"></h3>
                        <p data-i18n="pg_1_d"></p>
                    </div>
                </div>
                <div class="portfolio-item card-style reveal hover-up" style="transition-delay: 0.1s;">
                    <div class="port-img" style="background-image: url('https://images.unsplash.com/photo-1552820728-8b83bb6b773f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');"></div>
                    <div class="port-content">
                        <span class="tag">Unity 3D</span>
                        <h3 data-i18n="pg_2_t"></h3>
                        <p data-i18n="pg_2_d"></p>
                    </div>
                </div>
                <div class="portfolio-item card-style reveal hover-up" style="transition-delay: 0.2s;">
                    <div class="port-img" style="background-image: url('https://images.unsplash.com/photo-1538481199705-c710c4e965fc?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');"></div>
                    <div class="port-content">
                        <span class="tag">Mobile Native</span>
                        <h3 data-i18n="pg_3_t"></h3>
                        <p data-i18n="pg_3_d"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content" style="margin-bottom: 0; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 15px;">
            
            <!-- 1. Logo & Maklumat Syarikat (Tengah) -->
            <div class="footer-brand" style="display: flex; flex-direction: column; align-items: center;">
                <a href="index.html" class="logo-footer logo-text" style="justify-content: center; margin-bottom: 15px;">
                    <img src="logo.png" alt="Zenqor Logo" class="footer-logo-img">
                    <span class="text-primary">Zenqor</span> Technologies
                </a>
                <div style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;">
                    <p style="margin-bottom: 4px;">No. Pendaftaran: 202603157897 | (JM1045730-D)</p>
                    <p>Alamat: Bandar Mahkota Cheras, 43200 Selangor, Malaysia</p>
                </div>
            </div>

            <!-- 2. Pautan Polisi (Dipindahkan ke bawah maklumat, sebelum Hak Cipta) -->
            <div class="footer-links" style="display: flex; gap: 30px; font-size: 0.9rem; justify-content: center; margin-top: 10px;">
                <a href="return-policy.html" style="color: var(--text-secondary); text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='var(--primary-blue)'" onmouseout="this.style.color='var(--text-secondary)'">Return Policy</a>
                <a href="legal.html" style="color: var(--text-secondary); text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='var(--primary-blue)'" onmouseout="this.style.color='var(--text-secondary)'">Legal</a>
                <a href="data-policy.html" style="color: var(--text-secondary); text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='var(--primary-blue)'" onmouseout="this.style.color='var(--text-secondary)'">Data Policy</a>
            </div>
            
        </div>
        
        <!-- 3. Hak Cipta -->
        <div class="footer-bottom" style="padding-top: 20px; margin-top: 25px; border-top: 1px solid var(--border-color); text-align: center;">
            <p data-i18n="footer_copy"></p>
        </div>
    </footer>

    <script type="module">
        import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@2/dist/index.js';
        injectSpeedInsights();
    </script>
    <script src="script.js"></script>
</body>
</html>
