<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Zenqor Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-wrapper { padding-top: 120px; padding-bottom: 60px; min-height: 80vh; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; margin-bottom: 40px; }
        .admin-grid-full { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
        
        .admin-form, .data-list { padding: 30px; }
        .data-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 15px; }
        .data-item-info h4 { color: var(--primary-blue); margin-bottom: 5px; }
        .data-item-info p { font-size: 0.85rem; color: var(--text-secondary); }
        .btn-danger { background-color: rgba(239, 68, 68, 0.2); border: 1px solid #EF4444; color: #EF4444; padding: 8px 15px; font-size: 0.85rem; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-danger:hover { background-color: #EF4444; color: #fff; }
        .flex-row { display: flex; gap: 15px; }
        .flex-row input { flex: 1; }
        .form-section-title { color: var(--primary-blue); margin: 20px 0 10px 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;}
    </style>
</head>
<body class="bg-alt">
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo-nav logo-text">
                <i class="fas fa-shield-alt text-primary" style="margin-right: 10px;"></i>
                <span class="text-primary">Admin</span> Panel
            </div>
            <div style="display: flex; gap: 15px;">
                <a href="index.html" class="btn btn-outline" style="padding: 8px 15px; font-size: 0.85rem;">View Site</a>
                <button id="btnLogout" class="btn btn-danger">Logout</button>
            </div>
        </div>
    </header>

    <section class="admin-wrapper container">
        <div class="admin-header">
            <h2>Manage <span class="text-primary">Zenqor Platform</span></h2>
        </div>

        <div class="admin-grid-full">
            <div class="card-style admin-form">
                <h3 style="margin-bottom: 10px;">Tetapan Navigasi (Navbar)</h3>
                <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px;">Ubah suai teks pautan navigasi utama dan sub-menu untuk dwi-bahasa (Inggeris & Melayu).</p>
                <form id="updateNavbarForm">
                    
                    <div class="form-section-title">Menu Utama</div>
                    <div class="admin-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
                        <div class="input-group">
                            <label>Home (EN / MS)</label>
                            <div class="flex-row">
                                <input type="text" id="navHomeEN" placeholder="Home" required>
                                <input type="text" id="navHomeMS" placeholder="Utama" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Services (EN / MS)</label>
                            <div class="flex-row">
                                <input type="text" id="navServEN" placeholder="Services" required>
                                <input type="text" id="navServMS" placeholder="Servis" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>About (EN / MS)</label>
                            <div class="flex-row">
                                <input type="text" id="navAbtEN" placeholder="About" required>
                                <input type="text" id="navAbtMS" placeholder="Tentang Kami" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>FAQ (EN / MS)</label>
                            <div class="flex-row">
                                <input type="text" id="navFaqEN" placeholder="FAQ" required>
                                <input type="text" id="navFaqMS" placeholder="FAQ" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Contact (EN / MS)</label>
                            <div class="flex-row">
                                <input type="text" id="navConEN" placeholder="Contact" required>
                                <input type="text" id="navConMS" placeholder="Hubungi" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section-title">Menu Dropdown: Portfolio</div>
                    <div class="admin-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
                        <div class="input-group">
                            <label>Tajuk Utama Portfolio (EN / MS)</label>
                            <div class="flex-row">
                                <input type="text" id="navPortEN" placeholder="Portfolio" required>
                                <input type="text" id="navPortMS" placeholder="Portfolio" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Sub 1: Scripting Projects (EN / MS)</label>
                            <div class="flex-row">
                                <input type="text" id="navPortGameEN" placeholder="Scripting Projects" required>
                                <input type="text" id="navPortGameMS" placeholder="Projek Skrip" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Sub 2: Server Development (EN / MS)</label>
                            <div class="flex-row">
                                <input type="text" id="navPortWebEN" placeholder="Server Development" required>
                                <input type="text" id="navPortWebMS" placeholder="Pembangunan Pelayan" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section-title">Menu Dropdown: Careers</div>
                    <div class="admin-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
                        <div class="input-group">
                            <label>Tajuk Utama Careers (EN / MS)</label>
                            <div class="flex-row">
                                <input type="text" id="navCarEN" placeholder="Careers" required>
                                <input type="text" id="navCarMS" placeholder="Kerjaya" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Sub 1: Join Us (EN / MS)</label>
                            <div class="flex-row">
                                <input type="text" id="navCarJoinEN" placeholder="Join Us" required>
                                <input type="text" id="navCarJoinMS" placeholder="Sertai Kami" required>
                            </div>
                        </div>
                    </div>

                    <div id="navFormMessage" class="form-message mt-3"></div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">Simpan Semua Tetapan Navigasi</button>
                </form>
            </div>
        </div>

        <div class="admin-grid mt-5">
            <div class="card-style admin-form">
                <h3 style="margin-bottom: 20px;">Add New Portfolio</h3>
                <form id="addPortfolioForm">
                    <div class="input-group">
                        <label>Title</label>
                        <input type="text" id="pTitle" required placeholder="e.g. Enterprise System">
                    </div>
                    <div class="input-group">
                        <label>Tag / Technology</label>
                        <input type="text" id="pTag" required placeholder="e.g. React & Node.js">
                    </div>
                    <div class="input-group">
                        <label>Image URL</label>
                        <input type="url" id="pImg" required placeholder="https://...">
                    </div>
                    <div class="input-group">
                        <label>Description</label>
                        <textarea id="pDesc" rows="3" required placeholder="Short description..."></textarea>
                    </div>
                    <div id="formMessage" class="form-message"></div>
                    <button type="submit" class="btn btn-primary w-100">Add to Website</button>
                </form>
            </div>

            <div class="card-style data-list">
                <h3 style="margin-bottom: 20px;">Live Data (Portfolio)</h3>
                <div id="portfolioList">
                    <p style="color: var(--text-secondary); text-align: center;">Loading data...</p>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJyjvlm8jG-mT_1mDYsyF562L6XuskFxU",
            authDomain: "zenqor-web.firebaseapp.com",
            projectId: "zenqor-web",
            storageBucket: "zenqor-web.firebasestorage.app",
            messagingSenderId: "785478368719",
            appId: "1:785478368719:web:ef6fa34ed5d949ac2566ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "zenqortech@gmail.com"; 

        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== ADMIN_EMAIL) {
                alert("Access Denied. You are not an administrator.");
                window.location.href = "login.html";
            } else {
                fetchPortfolioData(); 
                loadNavbarSettings();
            }
        });

        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });

        // ==========================================
        // PENGURUSAN NAVBAR
        // ==========================================
        const navForm = document.getElementById('updateNavbarForm');
        const navMsg = document.getElementById('navFormMessage');
        const navbarDocRef = doc(db, "site_content", "navbar_translations");

        async function loadNavbarSettings() {
            try {
                const docSnap = await getDoc(navbarDocRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Main Menu
                    document.getElementById('navHomeEN').value = data.nav_home_en || "Home";
                    document.getElementById('navHomeMS').value = data.nav_home_ms || "Utama";
                    document.getElementById('navServEN').value = data.nav_services_en || "Services";
                    document.getElementById('navServMS').value = data.nav_services_ms || "Servis";
                    document.getElementById('navAbtEN').value = data.nav_about_en || "About";
                    document.getElementById('navAbtMS').value = data.nav_about_ms || "Tentang Kami";
                    document.getElementById('navFaqEN').value = data.nav_faq_en || "FAQ";
                    document.getElementById('navFaqMS').value = data.nav_faq_ms || "FAQ";
                    document.getElementById('navConEN').value = data.nav_contact_en || "Contact";
                    document.getElementById('navConMS').value = data.nav_contact_ms || "Hubungi";

                    // Portfolio Dropdown
                    document.getElementById('navPortEN').value = data.nav_portfolio_en || "Portfolio";
                    document.getElementById('navPortMS').value = data.nav_portfolio_ms || "Portfolio";
                    document.getElementById('navPortGameEN').value = data.nav_port_gaming_en || "Scripting Projects";
                    document.getElementById('navPortGameMS').value = data.nav_port_gaming_ms || "Projek Skrip";
                    document.getElementById('navPortWebEN').value = data.nav_port_web_en || "Server Development";
                    document.getElementById('navPortWebMS').value = data.nav_port_web_ms || "Pembangunan Pelayan";

                    // Careers Dropdown
                    document.getElementById('navCarEN').value = data.nav_careers_en || "Careers";
                    document.getElementById('navCarMS').value = data.nav_careers_ms || "Kerjaya";
                    document.getElementById('navCarJoinEN').value = data.nav_careers_join_en || "Join Us";
                    document.getElementById('navCarJoinMS').value = data.nav_careers_join_ms || "Sertai Kami";
                }
            } catch (err) {
                console.error("Gagal menarik data Navbar:", err);
            }
        }

        navForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = navForm.querySelector('button');
            btn.innerHTML = "Menyimpan...";
            btn.disabled = true;

            try {
                await setDoc(navbarDocRef, {
                    // Main Menu
                    nav_home_en: document.getElementById('navHomeEN').value,
                    nav_home_ms: document.getElementById('navHomeMS').value,
                    nav_services_en: document.getElementById('navServEN').value,
                    nav_services_ms: document.getElementById('navServMS').value,
                    nav_about_en: document.getElementById('navAbtEN').value,
                    nav_about_ms: document.getElementById('navAbtMS').value,
                    nav_faq_en: document.getElementById('navFaqEN').value,
                    nav_faq_ms: document.getElementById('navFaqMS').value,
                    nav_contact_en: document.getElementById('navConEN').value,
                    nav_contact_ms: document.getElementById('navConMS').value,

                    // Portfolio Dropdown
                    nav_portfolio_en: document.getElementById('navPortEN').value,
                    nav_portfolio_ms: document.getElementById('navPortMS').value,
                    nav_port_gaming_en: document.getElementById('navPortGameEN').value,
                    nav_port_gaming_ms: document.getElementById('navPortGameMS').value,
                    nav_port_web_en: document.getElementById('navPortWebEN').value,
                    nav_port_web_ms: document.getElementById('navPortWebMS').value,

                    // Careers Dropdown
                    nav_careers_en: document.getElementById('navCarEN').value,
                    nav_careers_ms: document.getElementById('navCarMS').value,
                    nav_careers_join_en: document.getElementById('navCarJoinEN').value,
                    nav_careers_join_ms: document.getElementById('navCarJoinMS').value,
                }, { merge: true });
                
                navMsg.textContent = "Semua Tetapan Navbar berjaya dikemas kini!";
                navMsg.className = "form-message msg-success";
                setTimeout(() => { navMsg.textContent = ""; }, 3000);
            } catch (error) {
                navMsg.textContent = "Ralat: " + error.message;
                navMsg.className = "form-message msg-error";
            } finally {
                btn.innerHTML = "Simpan Semua Tetapan Navigasi";
                btn.disabled = false;
            }
        });

        // ==========================================
        // PENGURUSAN PORTFOLIO
        // ==========================================
        const portfolioList = document.getElementById('portfolioList');
        const addForm = document.getElementById('addPortfolioForm');
        const formMsg = document.getElementById('formMessage');

        async function fetchPortfolioData() {
            portfolioList.innerHTML = "";
            const querySnapshot = await getDocs(collection(db, "portfolio_web"));
            
            if(querySnapshot.empty) {
                portfolioList.innerHTML = "<p>No portfolio items found.</p>";
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                
                const itemHtml = `
                    <div class="data-item">
                        <div class="data-item-info">
                            <h4>${data.title}</h4>
                            <p>[${data.tag}] - ${data.desc.substring(0, 50)}...</p>
                        </div>
                        <button class="btn-danger delete-btn" data-id="${id}"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                portfolioList.innerHTML += itemHtml;
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const docId = this.getAttribute('data-id');
                    if(confirm("Are you sure you want to delete this record?")) {
                        await deleteDoc(doc(db, "portfolio_web", docId));
                        fetchPortfolioData(); 
                    }
                });
            });
        }

        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = addForm.querySelector('button');
            btn.innerHTML = "Saving...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "portfolio_web"), {
                    title: document.getElementById('pTitle').value,
                    tag: document.getElementById('pTag').value,
                    imgUrl: document.getElementById('pImg').value,
                    desc: document.getElementById('pDesc').value,
                    createdAt: new Date()
                });
                
                formMsg.textContent = "Data successfully added!";
                formMsg.className = "form-message msg-success";
                addForm.reset();
                fetchPortfolioData(); 
            } catch (error) {
                formMsg.textContent = "Error: " + error.message;
                formMsg.className = "form-message msg-error";
            } finally {
                btn.innerHTML = "Add to Website";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
