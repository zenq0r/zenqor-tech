<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Admin Console | Zenqor Technologies</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Enterprise Dashboard Layout */
        body { margin: 0; display: flex; height: 100vh; overflow: hidden; background-color: var(--bg-color); }
        
        .admin-sidebar { width: 260px; background: rgba(15, 23, 42, 0.95); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--text-primary); font-size: 1.1rem; }
        .sidebar-nav { padding: 15px 0; flex-grow: 1; }
        .nav-group { margin-bottom: 20px; }
        .nav-group-title { padding: 0 20px; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 10px 20px; color: var(--text-primary); text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(59, 130, 246, 0.1); color: var(--primary-blue); border-left: 3px solid var(--primary-blue); }
        
        .admin-main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .admin-topbar { height: 70px; background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; }
        .admin-content { padding: 30px; overflow-y: auto; flex-grow: 1; }
        
        .admin-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        @media (max-width: 1024px) { .admin-grid { grid-template-columns: 1fr; } .admin-sidebar { display: none; } }
        
        .admin-form, .data-list { padding: 25px; }
        .data-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 15px; }
        .btn-danger { background-color: rgba(239, 68, 68, 0.2); border: 1px solid #EF4444; color: #EF4444; padding: 8px 15px; font-size: 0.85rem; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-danger:hover { background-color: #EF4444; color: #fff; }
        .loading-state { text-align: center; color: var(--text-secondary); padding: 20px; }
    </style>
</head>
<body>

    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <i class="fas fa-shield-alt text-primary"></i> Zenqor Console
        </div>
        <nav class="sidebar-nav">
            <div class="nav-group">
                <div class="nav-group-title">Core</div>
                <a href="#" class="sidebar-link"><i class="fas fa-chart-line w-20"></i> Dashboard</a>
                <a href="#" class="sidebar-link"><i class="fas fa-chart-pie w-20"></i> Analytics</a>
            </div>
            <div class="nav-group">
                <div class="nav-group-title">Content Management</div>
                <a href="#" class="sidebar-link active"><i class="fas fa-briefcase w-20"></i> Portfolio</a>
                <a href="#" class="sidebar-link"><i class="fas fa-cogs w-20"></i> Services</a>
                <a href="#" class="sidebar-link"><i class="fas fa-users w-20"></i> Careers</a>
                <a href="#" class="sidebar-link"><i class="fas fa-building w-20"></i> Company Profile</a>
            </div>
            <div class="nav-group">
                <div class="nav-group-title">System</div>
                <a href="#" class="sidebar-link"><i class="fas fa-search w-20"></i> SEO & Metadata</a>
                <a href="#" class="sidebar-link"><i class="fas fa-cog w-20"></i> Settings</a>
            </div>
        </nav>
    </aside>

    <main class="admin-main">
        <header class="admin-topbar">
            <div><h3 style="margin: 0;">Portfolio Manager</h3></div>
            <div style="display: flex; gap: 15px;">
                <a href="index.html" class="btn btn-outline" style="padding: 8px 15px; font-size: 0.85rem;">View Live Site</a>
                <button id="btnLogout" class="btn btn-danger">Secure Logout</button>
            </div>
        </header>

        <section class="admin-content">
            <div class="admin-grid">
                <div class="card-style admin-form">
                    <h3 style="margin-bottom: 20px;">Deploy New Portfolio</h3>
                    <form id="addPortfolioForm">
                        <div class="input-group">
                            <label>Title</label>
                            <input type="text" id="pTitle" required placeholder="e.g. Enterprise System">
                        </div>
                        <div class="input-group">
                            <label>Technology Stack</label>
                            <input type="text" id="pTag" required placeholder="e.g. React & Node.js">
                        </div>
                        <div class="input-group">
                            <label>Image Asset URL</label>
                            <input type="url" id="pImg" required placeholder="https://...">
                        </div>
                        <div class="input-group">
                            <label>Description</label>
                            <textarea id="pDesc" rows="3" required placeholder="Short description..."></textarea>
                        </div>
                        
                        <div id="formMessage" class="form-message"></div>
                        
                        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-cloud-upload-alt"></i> Publish to Website</button>
                    </form>
                </div>

                <div class="card-style data-list">
                    <h3 style="margin-bottom: 20px;">Live Database Records</h3>
                    <div id="portfolioList" class="loading-state">
                        <i class="fas fa-circle-notch fa-spin"></i> Establishing secure connection...
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // NOTA ENTERPRISE: Pastikan Firebase Security Rules dikonfigurasi pada Backend (Firestore) untuk mengelakkan manipulasi akses.
        const firebaseConfig = {
            apiKey: "AIzaSyCJyjvlm8jG-mT_1mDYsyF562L6XuskFxU",
            authDomain: "zenqor-web.firebaseapp.com",
            projectId: "zenqor-web",
            storageBucket: "zenqor-web.firebasestorage.app",
            messagingSenderId: "785478368719",
            appId: "1:785478368719:web:ef6fa34ed5d949ac2566ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "zenqortech@gmail.com"; 

        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== ADMIN_EMAIL) {
                window.location.replace("login.html");
            } else {
                fetchPortfolioData(); 
            }
        });

        document.getElementById('btnLogout').addEventListener('click', async () => {
            try {
                await signOut(auth);
                window.location.replace("login.html");
            } catch (error) {
                console.error("Logout Error:", error);
            }
        });

        const portfolioList = document.getElementById('portfolioList');
        const addForm = document.getElementById('addPortfolioForm');
        const formMsg = document.getElementById('formMessage');

        async function fetchPortfolioData() {
            try {
                const querySnapshot = await getDocs(collection(db, "portfolio_web"));
                portfolioList.innerHTML = "";
                
                if(querySnapshot.empty) {
                    portfolioList.innerHTML = "<p class='loading-state'>No portfolio items found in database.</p>";
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    
                    const itemHtml = `
                        <div class="data-item">
                            <div>
                                <h4 style="color: var(--primary-blue); margin-bottom: 5px;">${data.title}</h4>
                                <p style="font-size: 0.85rem; color: var(--text-secondary);">[${data.tag}] - ${data.desc.substring(0, 50)}...</p>
                            </div>
                            <button class="btn-danger delete-btn" data-id="${id}" aria-label="Delete entry"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    portfolioList.innerHTML += itemHtml;
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const docId = this.getAttribute('data-id');
                        if(confirm("DANGER: Are you sure you want to permanently delete this record?")) {
                            try {
                                await deleteDoc(doc(db, "portfolio_web", docId));
                                fetchPortfolioData(); 
                            } catch (error) {
                                alert("Failed to delete: " + error.message);
                            }
                        }
                    });
                });
            } catch (error) {
                portfolioList.innerHTML = `<p class='loading-state' style='color: #EF4444;'>Error fetching data: ${error.message}</p>`;
            }
        }

        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = addForm.querySelector('button');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = "<i class='fas fa-circle-notch fa-spin'></i> Deploying...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "portfolio_web"), {
                    title: document.getElementById('pTitle').value,
                    tag: document.getElementById('pTag').value,
                    imgUrl: document.getElementById('pImg').value,
                    desc: document.getElementById('pDesc').value,
                    createdAt: new Date()
                });
                
                formMsg.textContent = "Data successfully published!";
                formMsg.className = "form-message msg-success";
                addForm.reset();
                fetchPortfolioData(); 
            } catch (error) {
                formMsg.textContent = "Deployment Failed: " + error.message;
                formMsg.className = "form-message msg-error";
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
