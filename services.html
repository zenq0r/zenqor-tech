<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | Zenqor Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-nav logo-text">
                <img src="logo.png" alt="Zenqor Logo" class="nav-logo-img">
                <span class="text-primary">Zenqor</span> Technologies
            </a>
            <nav class="nav-links">
                <a href="return-policy.html" data-i18n="nav_return"></a>
                <a href="index.html" data-i18n="nav_home"></a>
                <a href="about.html" data-i18n="nav_about"></a>
                <a href="services.html" style="color: var(--primary-blue);" data-i18n="nav_services"></a>
                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="portfolio-menu"><span data-i18n="nav_portfolio"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i></a>
                    <div class="dropdown-menu" id="portfolio-menu"><a href="portfolio-gaming.html" data-i18n="nav_port_gaming"></a><a href="portfolio-web.html" data-i18n="nav_port_web"></a></div>
                </div>
                <div class="nav-item-dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle" data-target="careers-menu"><span data-i18n="nav_careers"></span> <i class="fas fa-chevron-down" style="font-size: 0.8em; margin-left: 5px;"></i></a>
                    <div class="dropdown-menu" id="careers-menu"><a href="careers.html" data-i18n="nav_careers_join"></a></div>
                </div>
                <a href="contact.html" data-i18n="nav_contact"></a>
                <button id="lang-toggle" class="lang-btn"></button>

            </nav>
            <div class="mobile-menu-btn"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <section class="hero-inner reveal">
        <div class="container hero-content reveal">
            <h1 data-i18n="nav_services"></h1>
        </div>
    </section>

    <section id="services" class="services section-padding">
        <div class="container">
            <div class="section-header reveal">
                <h2 data-i18n="srv_main_title"></h2>
                <p data-i18n="srv_main_sub"></p>
            </div>
            <div class="services-grid">
                <div class="service-card card-style reveal hover-up">
                    <i class="fas fa-gamepad text-primary icon-lg"></i>
                    <h3 data-i18n="srv_1_t"></h3>
                    <p data-i18n="srv_1_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.1s;">
                    <i class="fas fa-mobile-alt text-primary icon-lg"></i>
                    <h3 data-i18n="srv_2_t"></h3>
                    <p data-i18n="srv_2_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.2s;">
                    <i class="fas fa-globe text-primary icon-lg"></i>
                    <h3 data-i18n="srv_3_t"></h3>
                    <p data-i18n="srv_3_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.3s;">
                    <i class="fas fa-code text-primary icon-lg"></i>
                    <h3 data-i18n="srv_4_t"></h3>
                    <p data-i18n="srv_4_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.4s;">
                    <i class="fas fa-pen-nib text-primary icon-lg"></i>
                    <h3 data-i18n="srv_5_t"></h3>
                    <p data-i18n="srv_5_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.5s;">
                    <i class="fas fa-brain text-primary icon-lg"></i>
                    <h3 data-i18n="srv_6_t"></h3>
                    <p data-i18n="srv_6_d"></p>
                </div>
                <div class="service-card card-style reveal hover-up" style="transition-delay: 0.6s;">
                    <i class="fas fa-network-wired text-primary icon-lg"></i>
                    <h3 data-i18n="srv_7_t"></h3>
                    <p data-i18n="srv_7_d"></p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content" style="margin-bottom: 0; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 15px;">
            
            <!-- 1. Logo & Maklumat Syarikat (Tengah) -->
            <div class="footer-brand" style="display: flex; flex-direction: column; align-items: center;">
                <a href="index.html" class="logo-footer logo-text" style="justify-content: center; margin-bottom: 15px;">
                    <img src="logo.png" alt="Zenqor Logo" class="footer-logo-img">
                    <span class="text-primary">Zenqor</span> Technologies
                </a>
                <div style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6;">
                    <p style="margin-bottom: 4px;">No. Pendaftaran: 202603157897 | (JM1045730-D)</p>
                    <p>Alamat: Bandar Mahkota Cheras, 43200 Selangor, Malaysia</p>
                </div>
            </div>

            <!-- 2. Pautan Polisi (Dipindahkan ke bawah maklumat, sebelum Hak Cipta) -->
            <div class="footer-links" style="display: flex; gap: 30px; font-size: 0.9rem; justify-content: center; margin-top: 10px;">
                <a href="return-policy.html" style="color: var(--text-secondary); text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='var(--primary-blue)'" onmouseout="this.style.color='var(--text-secondary)'">Return Policy</a>
                <a href="legal.html" style="color: var(--text-secondary); text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='var(--primary-blue)'" onmouseout="this.style.color='var(--text-secondary)'">Legal</a>
                <a href="data-policy.html" style="color: var(--text-secondary); text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='var(--primary-blue)'" onmouseout="this.style.color='var(--text-secondary)'">Data Policy</a>
            </div>
            
        </div>
        
        <!-- 3. Hak Cipta -->
        <div class="footer-bottom" style="padding-top: 20px; margin-top: 25px; border-top: 1px solid var(--border-color); text-align: center;">
            <p data-i18n="footer_copy"></p>
        </div>
    </footer>

    <script type="module">
        import { injectSpeedInsights } from 'https://cdn.jsdelivr.net/npm/@vercel/speed-insights@2/dist/index.js';
        injectSpeedInsights();
    </script>
    <script src="script.js"></script>
</body>
</html>
